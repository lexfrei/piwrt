# /etc/sysupgrade.conf
#
# OpenWrt's default sysupgrade keep-list covers /etc/config/*, SSH host keys,
# /etc/dropbear/authorized_keys, /etc/passwd, /etc/shadow, /etc/group,
# /etc/crontabs, /etc/rc.local. Everything else is wiped. The paths below
# are project-specific extras — without them, sysupgrade hands you a Hopper
# that boots, but with no AWG (kmod tied to kernel ABI gets a new build
# on every release), no modem (usb-modeswitch+kmods wiped), and a dead
# split-VPN (dnsmasq-full replaced by base dnsmasq, ip-full replaced by
# BusyBox ip). post-upgrade.sh re-installs all of them.
#
# Append the active lines to /etc/sysupgrade.conf on the router. Do not
# replace the file wholesale — OpenWrt may add its own defaults in future
# releases that you want to keep.

# Watchdogs and helper scripts. /usr/bin/ is not in the default keep-list,
# so each of these vanishes on every upgrade without an explicit entry.
/usr/bin/awg-watchdog
/usr/bin/wifi-watchdog
/usr/bin/update-bypass-list
/usr/bin/etc-autocommit
/etc/allow-domains-user.lst

# Hotplug scripts. /etc/hotplug.d/ ships from the squashfs with OpenWrt's
# own core scripts and is replaced wholesale on sysupgrade — preserving
# the whole directory would freeze stale upstream scripts, so list our
# two specific files individually.
/etc/hotplug.d/iface/90-split-vpn
/etc/hotplug.d/iface/91-awg-dns-bootstrap

# nftables.d fragments. These are the ONLY copy of the split-VPN set
# definition (50-allow-domains.nft defines allow_domains_v4/v6 + the
# mangle chains that mark bypass traffic) and the mobile TTL fix
# (60-mobile-ttl.nft). Nothing in post-upgrade.sh recreates them, so
# without this entry a sysupgrade silently breaks split-VPN — the
# dnsmasq nftset= directives reference a set that no longer exists and
# become no-ops, sending all RU-bypass traffic through the tunnel —
# and drops the TTL fix. Preserve the whole directory; the only other
# file here is package-managed (https-dns-proxy notrack) and gets
# recreated by its own package anyway.
/etc/nftables.d/

# The post-upgrade.sh hook itself: the only piece of state that survives
# sysupgrade without external retrieval. Everything else (binaries,
# kmods, init scripts) is re-fetched by this script on first boot.
/usr/share/piwrt/post-upgrade.sh

# Bypass-list output. update-bypass-list re-creates it from the upstream
# source weekly, but having the last-good copy preserved means split-VPN
# works immediately after sysupgrade instead of waiting for the next
# weekly cron tick.
/etc/dnsmasq.d/

# /etc git history. /etc/config/* survives by default, but /etc/.git itself
# does not — without this entry the timeline of your "what did I change
# yesterday" answers is lost on every upgrade.
/etc/.git/
/etc/.gitignore

# vnstat traffic-accounting database. post-upgrade.sh re-installs the
# vnstat2 binary, but the per-interface history is in this directory.
# Without preserving it, every sysupgrade resets traffic counters to zero.
/var/lib/vnstat/
