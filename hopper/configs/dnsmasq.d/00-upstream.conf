# /etc/dnsmasq.d/00-upstream.conf
#
# Initial state — overwritten on the first netifd ifup/ifdown event
# by /etc/hotplug.d/iface/91-awg-dns-bootstrap. Shipped here so the
# very first dnsmasq start after sysupgrade has an upstream to send
# queries to, even before any hotplug has fired.
#
# Do not hand-edit. The hotplug script owns this file's contents.
server=127.0.0.1#5053
